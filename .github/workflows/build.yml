name: Build Debug APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # allows manual trigger from GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        id: build
        run: ./gradlew assembleDebug --no-daemon
        continue-on-error: true

      - name: Dump merged values around error line (on failure)
        if: steps.build.outcome == 'failure'
        run: |
          FILE="app/build/intermediates/incremental/debug/mergeDebugResources/merged.dir/values/values.xml"
          echo "=== Lines 1920-1940 of merged values ==="
          sed -n '1920,1940p' "$FILE"

      - name: Fail if build failed
        if: steps.build.outcome == 'failure'
        run: exit 1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: call-recorder-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
