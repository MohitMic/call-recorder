name: Build Debug APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # allows manual trigger from GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        id: build
        run: ./gradlew assembleDebug --no-daemon
        continue-on-error: true

      - name: Dump merged values around error line (on failure)
        if: steps.build.outcome == 'failure'
        run: |
          echo "=== All values.xml files in build dir ==="
          find app/build -name "values.xml" 2>/dev/null | while read f; do
            lines=$(wc -l < "$f")
            echo "$lines lines: $f"
          done
          echo ""
          echo "=== Largest values.xml ==="
          FILE=$(find app/build -name "values.xml" 2>/dev/null | xargs wc -l 2>/dev/null | sort -rn | awk 'NR==1{print $2}')
          if [ -n "$FILE" ] && [ "$FILE" != "total" ]; then
            echo "File: $FILE"
            echo "--- Lines 1910-1950 ---"
            sed -n '1910,1950p' "$FILE"
          else
            echo "No large values.xml found"
          fi
          echo ""
          echo "=== AAPT2 intermediate dir ==="
          find app/build/intermediates -type d -name "debug" 2>/dev/null | head -10

      - name: Fail if build failed
        if: steps.build.outcome == 'failure'
        run: exit 1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: call-recorder-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
