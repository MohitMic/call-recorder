<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Call Recordings — Admin</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #161922;
    --panel-2: #1d2230;
    --border: #2a2f3d;
    --pink: #e91e63;
    --pink-soft: rgba(233,30,99,0.15);
    --text: #ffffff;
    --text-dim: #9aa3b2;
    --green: #4caf50;
    --orange: #ff9800;
    --red: #ef5350;
    --blue: #42a5f5;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    background: var(--panel);
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 20;
  }
  header .row1 {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  header h1 {
    margin: 0;
    font-size: 18px;
    color: var(--pink);
  }
  .stats {
    font-size: 12px;
    color: var(--text-dim);
  }
  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filters input, .filters select, .filters button {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
  }
  .filters input { min-width: 200px; }
  .filters button {
    background: var(--pink);
    border-color: var(--pink);
    cursor: pointer;
    font-weight: 600;
  }
  .filters button.secondary {
    background: var(--panel-2);
    border-color: var(--border);
    font-weight: normal;
  }
  .filters button:hover { opacity: 0.92; }

  .player-bar {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: none;
    position: sticky;
    top: 64px;
    z-index: 19;
  }
  .player-bar.visible { display: block; }
  .player-bar .title {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  audio { width: 100%; height: 36px; }

  main {
    padding: 16px 20px 80px;
  }
  .table-wrap {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .table-scroll {
    overflow-x: auto;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    background: var(--panel-2);
    color: var(--text-dim);
    font-weight: 600;
    text-align: left;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  thead th:hover { color: var(--text); }
  thead th .sort-ind {
    color: var(--pink);
    margin-left: 4px;
  }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  tbody tr:hover { background: rgba(255,255,255,0.02); }
  tbody tr.playing { background: var(--pink-soft); }
  tbody td {
    padding: 10px 12px;
    vertical-align: middle;
  }
  td.number { font-weight: 600; }
  td.muted { color: var(--text-dim); }
  td.mono { font-family: ui-monospace, monospace; font-size: 11px; color: var(--text-dim); max-width: 360px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  td.file { font-size: 12px; color: var(--text); max-width: 380px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .pill {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
    letter-spacing: 0.5px;
  }
  .pill.in   { background: rgba(76,175,80,0.18);  color: var(--green); }
  .pill.out  { background: rgba(66,165,245,0.18); color: var(--blue);  }
  .pill.unk  { background: rgba(160,160,160,0.18); color: var(--text-dim); }

  .play-btn {
    background: var(--pink);
    border: none;
    color: white;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 14px;
    flex-shrink: 0;
    line-height: 32px;
    padding: 0;
  }
  .play-btn:hover { opacity: 0.9; }

  .pagination {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    background: var(--panel-2);
    border-top: 1px solid var(--border);
    font-size: 13px;
  }
  .pagination button {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    margin: 0 2px;
  }
  .pagination button:disabled { opacity: 0.3; cursor: not-allowed; }
  .pagination button.active {
    background: var(--pink);
    border-color: var(--pink);
    font-weight: 600;
  }
  .pagination .info { color: var(--text-dim); }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }
  .empty .icon { font-size: 40px; margin-bottom: 12px; }
  .error {
    background: #4a1a1a;
    color: #ffb4b4;
    padding: 12px 16px;
    border-radius: 8px;
    margin-bottom: 16px;
    font-size: 13px;
  }

  /* Login */
  .login-box {
    max-width: 360px;
    margin: 80px auto;
    background: var(--panel);
    padding: 28px;
    border-radius: 12px;
    border: 1px solid var(--border);
  }
  .login-box h2 { margin-top: 0; color: var(--pink); }
  .login-box input {
    width: 100%;
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 10px;
    border-radius: 6px;
    margin-bottom: 12px;
    font-size: 14px;
    font-family: inherit;
  }
  .login-box button {
    width: 100%;
    background: var(--pink);
    color: white;
    border: none;
    padding: 10px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  @media (max-width: 700px) {
    th.col-source, td.col-source { display: none; }
    .filters input { min-width: 140px; flex: 1; }
  }
</style>
</head>
<body>

<!-- Login gate -->
<div id="loginGate">
  <div class="login-box">
    <h2>Admin Sign-in</h2>
    <p style="font-size:13px;color:var(--text-dim);margin-top:0;">
      Enter the admin password to view recordings.
    </p>
    <input id="pwInput" type="password" placeholder="Password" />
    <button id="pwBtn">Unlock</button>
  </div>
</div>

<!-- Main app -->
<div id="app" style="display:none;">
  <header>
    <div class="row1">
      <h1>📞 Call Recordings</h1>
      <div class="stats" id="stats">Loading…</div>
    </div>
    <div class="filters">
      <input id="searchInput" type="text" placeholder="Search number / file / device…" />
      <select id="deviceFilter"><option value="ALL">All devices</option></select>
      <select id="dirFilter">
        <option value="ALL">All directions</option>
        <option value="INCOMING">Incoming</option>
        <option value="OUTGOING">Outgoing</option>
        <option value="UNKNOWN">Unknown</option>
      </select>
      <select id="pageSize">
        <option value="25">25 / page</option>
        <option value="50" selected>50 / page</option>
        <option value="100">100 / page</option>
        <option value="250">250 / page</option>
      </select>
      <button id="refreshBtn">Refresh</button>
    </div>
  </header>

  <div class="player-bar" id="playerBar">
    <div class="title" id="playerTitle"></div>
    <audio id="audioEl" controls></audio>
  </div>

  <main>
    <div id="errorBox" class="error" style="display:none;"></div>

    <div class="table-wrap">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th data-sort="recorded_at" class="col-date">Date / Time</th>
              <th data-sort="file_name">File / Caller</th>
              <th data-sort="number">Number</th>
              <th data-sort="direction">Dir</th>
              <th data-sort="duration_ms">Duration</th>
              <th data-sort="device_label">Device</th>
              <th data-sort="source_used" class="col-source">Source</th>
              <th>Play</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <div class="pagination">
        <div class="info" id="pageInfo"></div>
        <div id="pageButtons"></div>
      </div>
    </div>

    <div id="emptyState" class="empty" style="display:none;">
      <div class="icon">🎙</div>
      <div>No recordings match your filters.</div>
    </div>
  </main>
</div>

<script>
  // ─── CONFIG ──────────────────────────────────────────────────────────────
  const SUPABASE_URL  = "https://tahyfwvlnlufqkzknbcm.supabase.co";
  const SUPABASE_KEY  = "sb_publishable_VPkvLBuf_p8ltI4LH0bTuw_PHp6rLYn";
  const ADMIN_PASSWORD = "admin123"; // change me before sharing

  // ─── Login gate ──────────────────────────────────────────────────────────
  const loginGate = document.getElementById("loginGate");
  const app       = document.getElementById("app");
  const pwInput   = document.getElementById("pwInput");
  const pwBtn     = document.getElementById("pwBtn");
  function tryLogin() {
    if (pwInput.value === ADMIN_PASSWORD) {
      sessionStorage.setItem("adminUnlocked", "1");
      showApp();
    } else {
      pwInput.value = "";
      pwInput.placeholder = "Wrong password";
    }
  }
  pwBtn.onclick = tryLogin;
  pwInput.addEventListener("keydown", (e) => { if (e.key === "Enter") tryLogin(); });
  if (sessionStorage.getItem("adminUnlocked") === "1") showApp();

  function showApp() {
    loginGate.style.display = "none";
    app.style.display = "";
    loadDeviceFilter().then(loadPage);
  }

  // ─── State ────────────────────────────────────────────────────────────────
  let sortKey = "recorded_at";
  let sortDir = "desc";       // "asc" | "desc"
  let page = 0;               // 0-based
  let pageSize = 50;
  let totalRows = 0;          // last known total from Content-Range
  let currentlyPlayingId = null;
  let currentRows = [];       // rows currently displayed
  let lastFetchAbort = null;  // AbortController for cancelling stale requests
  let searchDebounce = null;

  const $ = (id) => document.getElementById(id);
  const tbody = $("tbody");
  const audioEl = $("audioEl");
  const playerBar = $("playerBar");
  const playerTitle = $("playerTitle");

  // Build the PostgREST query for the current page+sort+filter state.
  function buildQuery() {
    const params = [];
    params.push(`select=*`);
    // Sort
    const orderField = sortKey;
    params.push(`order=${orderField}.${sortDir}.nullslast`);

    // Filters
    const dir = $("dirFilter").value;
    if (dir !== "ALL") params.push(`direction=eq.${encodeURIComponent(dir)}`);
    const dev = $("deviceFilter").value;
    if (dev !== "ALL") params.push(`device_id=eq.${encodeURIComponent(dev)}`);

    // Search — match across multiple text columns with `or=...`
    const q = $("searchInput").value.trim();
    if (q) {
      const enc = encodeURIComponent(`*${q}*`);
      const orList = [
        `number.ilike.${enc}`,
        `file_name.ilike.${enc}`,
        `device_label.ilike.${enc}`,
        `source_used.ilike.${enc}`,
      ].join(",");
      params.push(`or=(${orList})`);
    }
    return params.join("&");
  }

  // Fetch the device list once (for the filter dropdown). Distinct device_ids
  // only — runs separate from the main paginated query.
  async function loadDeviceFilter() {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/recordings?select=device_id,device_label&limit=10000`,
      { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
    );
    if (!res.ok) return;
    const rows = await res.json();
    const seen = new Map(); // id → {label, count}
    rows.forEach((r) => {
      const id = r.device_id || "unknown";
      const lab = r.device_label || "Unknown device";
      const ex = seen.get(id);
      if (ex) ex.count++; else seen.set(id, { label: lab, count: 1 });
    });
    const sel = $("deviceFilter");
    const prev = sel.value;
    sel.innerHTML = '<option value="ALL">All devices</option>' +
      Array.from(seen.entries())
        .sort((a, b) => a[1].label.localeCompare(b[1].label))
        .map(([id, v]) => `<option value="${escapeHtml(id)}">${escapeHtml(v.label)} (${v.count})</option>`)
        .join("");
    if (prev && Array.from(sel.options).some(o => o.value === prev)) sel.value = prev;
  }

  // ─── Server-side paginated fetch ─────────────────────────────────────────
  async function loadPage() {
    // Cancel any in-flight request so a fast click doesn't show stale data.
    if (lastFetchAbort) lastFetchAbort.abort();
    lastFetchAbort = new AbortController();

    $("errorBox").style.display = "none";

    const from = page * pageSize;
    const to   = from + pageSize - 1;
    const url  = `${SUPABASE_URL}/rest/v1/recordings?${buildQuery()}`;

    let res;
    try {
      res = await fetch(url, {
        signal:  lastFetchAbort.signal,
        headers: {
          apikey:        SUPABASE_KEY,
          Authorization: `Bearer ${SUPABASE_KEY}`,
          // Range header asks PostgREST for one specific page; Prefer asks
          // for an exact total count so we know how many pages exist.
          Range:         `${from}-${to}`,
          "Range-Unit":  "items",
          Prefer:        "count=exact",
        },
      });
    } catch (e) {
      if (e.name === "AbortError") return;
      $("errorBox").style.display = "";
      $("errorBox").textContent = "Network error: " + e.message;
      return;
    }

    if (!res.ok && res.status !== 206) {
      $("errorBox").style.display = "";
      $("errorBox").textContent = `Supabase ${res.status}: ${await res.text()}`;
      return;
    }

    // Content-Range: "0-49/335"
    const cr = res.headers.get("Content-Range") || "";
    const totalMatch = cr.match(/\/(\d+)$/);
    totalRows = totalMatch ? parseInt(totalMatch[1], 10) : 0;
    currentRows = await res.json();

    // If page went out of bounds (e.g. after filtering), clamp & retry.
    const totalPages = Math.max(1, Math.ceil(totalRows / pageSize));
    if (page >= totalPages) {
      page = totalPages - 1;
      if (page < 0) page = 0;
      return loadPage();
    }

    render();
  }

  function render() {
    if (totalRows === 0) {
      tbody.innerHTML = "";
      $("emptyState").style.display = "";
    } else {
      $("emptyState").style.display = "none";
      tbody.innerHTML = currentRows.map(rowHtml).join("");
      tbody.querySelectorAll(".play-btn").forEach((btn) => {
        btn.addEventListener("click", () => onPlay(btn));
      });
    }
    const start = page * pageSize;
    const startNum = totalRows === 0 ? 0 : start + 1;
    const endNum   = Math.min(start + currentRows.length, totalRows);
    $("pageInfo").textContent = `${startNum}–${endNum} of ${totalRows}`;
    $("stats").textContent = `${totalRows} recording${totalRows === 1 ? "" : "s"}`;
    const totalPages = Math.max(1, Math.ceil(totalRows / pageSize));
    renderPageButtons(totalPages);
    renderSortIndicators();
  }

  function rowHtml(r) {
    const date = r.recorded_at
      ? new Date(r.recorded_at).toLocaleString(undefined, {
          year: "numeric", month: "short", day: "numeric",
          hour: "2-digit", minute: "2-digit",
        })
      : "—";
    const dir = (r.direction || "UNKNOWN").toUpperCase();
    const dirClass = dir === "INCOMING" ? "in" : dir === "OUTGOING" ? "out" : "unk";
    const dirLabel = dir === "INCOMING" ? "↓ IN" : dir === "OUTGOING" ? "↑ OUT" : "?";
    const dur = formatMs(r.duration_ms || 0);
    const playing = currentlyPlayingId === r.id ? "playing" : "";
    // Strip extension from file_name for nicer display
    const displayName = (r.file_name || "").replace(/\.[a-zA-Z0-9]+$/, "");
    return `
      <tr class="${playing}" data-id="${r.id}">
        <td>${escapeHtml(date)}</td>
        <td class="file" title="${escapeHtml(r.file_name || "")}">${escapeHtml(displayName || "—")}</td>
        <td class="number">${escapeHtml(r.number && r.number !== "Unknown" ? r.number : "—")}</td>
        <td><span class="pill ${dirClass}">${dirLabel}</span></td>
        <td>${dur}</td>
        <td>${escapeHtml(r.device_label || "—")}</td>
        <td class="muted col-source">${escapeHtml(r.source_used || "—")}</td>
        <td>
          <button class="play-btn" data-id="${r.id}" data-url="${escapeHtml(r.cloudinary_url || "")}" data-title="${escapeHtml(displayName || r.file_name || "")}">▶</button>
        </td>
      </tr>`;
  }

  function renderPageButtons(totalPages) {
    const container = $("pageButtons");
    container.innerHTML = "";
    if (totalPages <= 1) return;

    const mkBtn = (label, p, opts = {}) => {
      const b = document.createElement("button");
      b.textContent = label;
      if (opts.active) b.classList.add("active");
      if (opts.disabled) b.disabled = true;
      else b.onclick = () => { page = p; loadPage(); };
      return b;
    };
    container.appendChild(mkBtn("‹ Prev", page - 1, { disabled: page === 0 }));

    // numeric pages with ellipses
    const pages = pageRange(page, totalPages);
    pages.forEach((p) => {
      if (p === "…") {
        const span = document.createElement("span");
        span.textContent = "…";
        span.style.padding = "0 6px";
        span.style.color = "var(--text-dim)";
        container.appendChild(span);
      } else {
        container.appendChild(mkBtn(String(p + 1), p, { active: p === page }));
      }
    });

    container.appendChild(mkBtn("Next ›", page + 1, { disabled: page >= totalPages - 1 }));
  }
  function pageRange(current, total) {
    if (total <= 7) return Array.from({length: total}, (_, i) => i);
    const result = new Set([0, total - 1, current]);
    for (let d = 1; d <= 1; d++) {
      if (current - d > 0) result.add(current - d);
      if (current + d < total - 1) result.add(current + d);
    }
    const sorted = Array.from(result).sort((a, b) => a - b);
    const out = [];
    for (let i = 0; i < sorted.length; i++) {
      if (i > 0 && sorted[i] - sorted[i - 1] > 1) out.push("…");
      out.push(sorted[i]);
    }
    return out;
  }

  function renderSortIndicators() {
    document.querySelectorAll("thead th[data-sort]").forEach((th) => {
      const key = th.dataset.sort;
      th.querySelector(".sort-ind")?.remove();
      if (key === sortKey) {
        const span = document.createElement("span");
        span.className = "sort-ind";
        span.textContent = sortDir === "asc" ? " ▲" : " ▼";
        th.appendChild(span);
      }
    });
  }

  // ─── Sort header clicks ──────────────────────────────────────────────────
  document.querySelectorAll("thead th[data-sort]").forEach((th) => {
    th.addEventListener("click", () => {
      const key = th.dataset.sort;
      if (sortKey === key) {
        sortDir = sortDir === "asc" ? "desc" : "asc";
      } else {
        sortKey = key;
        sortDir = key === "recorded_at" ? "desc" : "asc";
      }
      page = 0;
      loadPage();
    });
  });

  // ─── Filter changes ──────────────────────────────────────────────────────
  // Search debounces (avoid a request per keystroke); selects fire immediately.
  $("searchInput").addEventListener("input", () => {
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(() => { page = 0; loadPage(); }, 300);
  });
  ["deviceFilter", "dirFilter"].forEach((id) => {
    $(id).addEventListener("change", () => { page = 0; loadPage(); });
  });
  $("pageSize").addEventListener("change", () => {
    pageSize = parseInt($("pageSize").value, 10);
    page = 0;
    loadPage();
  });
  $("refreshBtn").addEventListener("click", () => {
    loadDeviceFilter().then(loadPage);
  });

  // ─── Play button ─────────────────────────────────────────────────────────
  function onPlay(btn) {
    const id = btn.dataset.id;
    const url = btn.dataset.url;
    const title = btn.dataset.title;
    if (!url) { alert("No Cloudinary URL on this row."); return; }
    if (currentlyPlayingId === id) {
      audioEl.paused ? audioEl.play() : audioEl.pause();
      return;
    }
    currentlyPlayingId = id;
    playerBar.classList.add("visible");
    playerTitle.textContent = title;
    audioEl.src = url;
    audioEl.play().catch(() => {});
    document.querySelectorAll("tbody tr").forEach(tr => tr.classList.remove("playing"));
    btn.closest("tr")?.classList.add("playing");
  }

  // ─── Helpers ─────────────────────────────────────────────────────────────
  function formatMs(ms) {
    if (!ms || ms <= 0) return "—";
    const s = Math.floor(ms / 1000);
    const m = Math.floor(s / 60);
    const sec = s % 60;
    if (m >= 60) {
      const h = Math.floor(m / 60);
      const mm = m % 60;
      return `${h}:${String(mm).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
    }
    return `${m}:${String(sec).padStart(2, "0")}`;
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }
</script>
</body>
</html>
